<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Qwen Layout Converter</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: #111;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input, select, button, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
      }

      textarea {
        resize: none;
        min-height: 78px;
        font-family: Inter, system-ui, sans-serif;
      }

      button {
        background: #18a0fb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #0d8ae6;
      }

      #status {
        font-size: 12px;
        color: #555;
        min-height: 24px;
        white-space: pre-wrap;
      }

      .readonly {
        background: #f7f7f7;
        color: #333;
      }

      .zone-result {
        min-height: 160px;
        max-height: 280px;
        overflow: auto;
        white-space: pre;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }

      #semantic-json-btn {
        background: #0d9488;
      }

      #semantic-json-btn:hover {
        background: #0f766e;
      }

      #html-export-btn {
        background: #059669;
      }

      #layout-transformer-btn {
        background: #7c3aed;
      }

      #layout-transformer-btn:hover {
        background: #6d28d9;
      }

      #layout-transformer-v2-btn {
        background: #2563eb;
      }

      #layout-transformer-v2-btn:hover {
        background: #1d4ed8;
      }

      #copy-html-btn,
      #copy-semantic-btn {
        background: #475569;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .pipeline-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.78);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
      }

      .pipeline-overlay[hidden] {
        display: none !important;
      }

      .pipeline-overlay-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 20px 28px;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e5e5e5;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      }

      .pipeline-overlay-text {
        font-size: 13px;
        font-weight: 600;
        color: #333;
      }

      .pipeline-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e5e5e5;
        border-top-color: #18a0fb;
        border-radius: 50%;
        animation: pipeline-spin 0.85s linear infinite;
      }

      @keyframes pipeline-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="selected-frame">Selected Figma design(s)</label>
      <textarea id="selected-frame" class="readonly" readonly>No frame selected.</textarea>
    </div>

    <div class="row">
      <label for="backend-url">Backend URL</label>
      <input id="backend-url" value="https://ml.geex.agency/lium" />
    </div>

    <div class="row">
      <label for="target-size">Target Size (widthxheight)</label>
      <input id="target-size" value="1024x1280" placeholder="1024x1280" />
    </div>

      <div class="row">
        <button id="pipeline-btn">Generate</button>
      </div>

    <div class="row" hidden aria-hidden="true">
      <button id="layout-transformer-btn" type="button" hidden tabindex="-1">
        Layout Transformer — semantic JSON + target size → clone beside frame (1+ frames)
      </button>
    </div>

    <div class="row" hidden aria-hidden="true">
      <button id="layout-transformer-v2-btn" type="button" hidden tabindex="-1">
        Layout Transformer V2 — 3-model rich semantic JSON → clone beside frame (1+ frames)
      </button>
    </div>

    <div id="semantic-json-section">
      <div class="row">
        <label for="semantic-max-tokens">Semantic JSON — max new tokens (256–8192; names-only output is small)</label>
        <input id="semantic-max-tokens" type="number" min="256" max="8192" value="2048" />
      </div>

      <div class="row">
        <button id="semantic-json-btn" type="button">
          Senmantic namer
        </button>
      </div>

      <div class="row">
        <label>Semantic JSON result</label>
        <textarea id="semantic-json-result" class="zone-result readonly" readonly>
Select one or more frames, then run “Banner + grid PNG + raw JSON → semantic JSON”. Multiple frames run in order; failures are skipped and logged here.
        </textarea>
        <div style="display: flex; gap: 8px; margin-top: 8px">
          <button id="copy-semantic-btn" type="button" style="flex: 1">Copy JSON</button>
          <button id="download-semantic-btn" type="button" style="flex: 1; background: #334155">Download .json</button>
        </div>
      </div>
    </div>

    <div class="row">
      <button id="html-export-btn" type="button">
        HTML/CSS Exporter
      </button>
    </div>

    <div class="row">
      <label>HTML/CSS export</label>
      <textarea id="html-export-result" class="zone-result readonly" readonly>
Select one or more frames, then click “JSON to HTML/CSS Exporter”. Each frame exports in order; multiple downloads may run (staggered). Errors are appended here.
      </textarea>
      <button id="copy-html-btn" type="button" style="margin-top: 8px">
        Copy HTML/CSS
      </button>
    </div>

    <div id="status"></div>

    <div id="pipeline-overlay" class="pipeline-overlay" hidden aria-live="polite">
      <div class="pipeline-overlay-card">
        <div class="pipeline-spinner" role="status" aria-label="Loading"></div>
        <div class="pipeline-overlay-text">Calling backend…</div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const pipelineBtn = document.getElementById("pipeline-btn");
      const layoutTransformerBtn = document.getElementById("layout-transformer-btn");
      const layoutTransformerV2Btn = document.getElementById("layout-transformer-v2-btn");
      const semanticJsonBtn = document.getElementById("semantic-json-btn");
      const semanticMaxTokensEl = document.getElementById("semantic-max-tokens");
      const semanticJsonResultEl = document.getElementById("semantic-json-result");
      const copySemanticBtn = document.getElementById("copy-semantic-btn");
      const downloadSemanticBtn = document.getElementById("download-semantic-btn");
      const htmlExportBtn = document.getElementById("html-export-btn");
      const htmlExportResultEl = document.getElementById("html-export-result");
      const copyHtmlBtn = document.getElementById("copy-html-btn");
      const selectedFrameEl = document.getElementById("selected-frame");
      let lastSemanticFileBase = "semantic_figma";

      function setStatus(message) {
        statusEl.textContent = message;
      }

      const pipelineOverlayEl = document.getElementById("pipeline-overlay");

      function setPipelineLoading(on, overlayMessage) {
        const busy = !!on;
        if (pipelineOverlayEl) pipelineOverlayEl.hidden = !busy;
        const overlayTextEl = pipelineOverlayEl
          ? pipelineOverlayEl.querySelector(".pipeline-overlay-text")
          : null;
        if (overlayTextEl) {
          overlayTextEl.textContent =
            overlayMessage || "Calling backend…";
        }
        if (pipelineBtn) pipelineBtn.disabled = busy;
        if (layoutTransformerBtn) layoutTransformerBtn.disabled = busy;
        if (layoutTransformerV2Btn) layoutTransformerV2Btn.disabled = busy;
        if (semanticJsonBtn) semanticJsonBtn.disabled = busy;
        if (htmlExportBtn) htmlExportBtn.disabled = busy;
      }

      function setSelectedFrameInfo(info) {
        if (!info || !info.hasSelection) {
          selectedFrameEl.value = "No frame selected.";
          return;
        }

        if (!info.isFrame || !info.frameCount) {
          selectedFrameEl.value =
            `Selection: ${info.selectionCount} node(s), no FRAME nodes.\n` +
            `Select one or more frames for batch export / pipeline.\n` +
            `First selected: ${info.name} (${info.type})`;
          return;
        }

        if (info.frameCount === 1) {
          selectedFrameEl.value =
            `1 frame selected.\n` +
            `Name: ${info.name}\n` +
            `Type: ${info.type}\n` +
            `ID: ${info.id}\n` +
            `Size: ${info.width} × ${info.height}`;
          return;
        }

        const lines = info.frames.map(
          (f, i) =>
            `${i + 1}. ${f.name} — ${f.width}×${f.height} (id ${f.id})`,
        );
        selectedFrameEl.value =
          `${info.frameCount} frames selected (processed in list order):\n` + lines.join("\n");
      }

      function setHtmlExportResult(text) {
        htmlExportResultEl.value = text;
      }

      function safeFileName(value) {
        return String(value || "figma-export")
          .trim()
          .replace(/[^a-zA-Z0-9._-]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 80) || "figma-export";
      }

      function downloadTextFile(filename, text, mimeType) {
        const blob = new Blob([text], { type: mimeType || "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function normalizeTargetSizeText(value) {
        const raw = String(value || "").trim();
        const parts = raw
          .split(/[,\sx×]+/i)
          .map((part) => part.trim())
          .filter(Boolean);
        if (parts.length >= 2 && /^\d+(\.\d+)?$/.test(parts[0]) && /^\d+(\.\d+)?$/.test(parts[1])) {
          return `${Math.round(Number(parts[0]))}x${Math.round(Number(parts[1]))}`;
        }
        return raw;
      }

      const targetSizeEl = document.getElementById("target-size");
      targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value || "1024x1280");
      targetSizeEl.addEventListener("input", () => {
        if (targetSizeEl.value.includes(",")) {
          targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value);
        }
      });
      targetSizeEl.addEventListener("blur", () => {
        targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value);
      });

      semanticJsonBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const mt = Math.min(
          8192,
          Math.max(256, parseInt(String(semanticMaxTokensEl.value), 10) || 2048),
        );
        semanticMaxTokensEl.value = String(mt);
        setStatus("Calling backend…");
        setPipelineLoading(true, "Calling backend…");
        semanticJsonResultEl.value = "…";
        parent.postMessage(
          {
            pluginMessage: {
              type: "semantic-json-grid-selected-frame",
              backendUrl,
              maxNewTokens: mt,
            },
          },
          "*",
        );
      };

      copySemanticBtn.onclick = async () => {
        const text = semanticJsonResultEl.value || "";
        if (!text.trim() || text.trim() === "…") {
          setStatus("Nothing to copy.");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("Semantic JSON copied.");
        } catch (_e) {
          semanticJsonResultEl.select();
          document.execCommand("copy");
          setStatus("Semantic JSON selected / copied.");
        }
      };

      downloadSemanticBtn.onclick = () => {
        const text = semanticJsonResultEl.value || "";
        if (!text.trim() || text.trim() === "…") {
          setStatus("No JSON to download.");
          return;
        }
        downloadTextFile(
          `${safeFileName(lastSemanticFileBase)}.json`,
          text,
          "application/json;charset=utf-8",
        );
        setStatus("Downloaded " + safeFileName(lastSemanticFileBase) + ".json");
      };

      pipelineBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetSize = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetSize;

        setStatus("Preparing classify → retrieve → draw pipeline...");
        setPipelineLoading(true, "Calling backend…");

        parent.postMessage(
          {
            pluginMessage: {
              type: "pipeline-target-json-selected-frame",
              backendUrl,
              targetSize
            }
          },
          "*"
        );
      };

      layoutTransformerBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetSize = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetSize;
        setStatus("Calling layout transformer on semantic JSON…");
        setPipelineLoading(true);
        parent.postMessage(
          {
            pluginMessage: {
              type: "layout-transformer-convert-selected-frame",
              backendUrl,
              targetSize,
            },
          },
          "*",
        );
      };

      layoutTransformerV2Btn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetSize = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetSize;
        setStatus("Calling Layout Transformer V2 on rich semantic JSON…");
        setPipelineLoading(true);
        parent.postMessage(
          {
            pluginMessage: {
              type: "layout-transformer-v2-convert-selected-frame",
              backendUrl,
              targetSize,
            },
          },
          "*",
        );
      };

      htmlExportBtn.onclick = () => {
        setStatus("Exporting selected frame JSON to HTML/CSS...");
        setHtmlExportResult("...");
        parent.postMessage(
          {
            pluginMessage: {
              type: "export-selected-frame-html-css"
            }
          },
          "*"
        );
      };

      copyHtmlBtn.onclick = async () => {
        const text = htmlExportResultEl.value || "";
        if (!text.trim()) {
          setStatus("Nothing to copy.");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("HTML/CSS copied to clipboard.");
        } catch (_e) {
          htmlExportResultEl.select();
          document.execCommand("copy");
          setStatus("HTML/CSS selected/copied.");
        }
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "semantic-json-fetch") {
          const mid = msg.id;
          const reply = (payload) => {
            parent.postMessage(
              { pluginMessage: Object.assign({ type: "semantic-json-fetch-result", id: mid }, payload) },
              "*",
            );
          };
          const replyData = (data) => {
            const text = JSON.stringify(data);
            const maxChunk = 64000;
            if (text.length <= maxChunk) {
              reply({ ok: true, data, error: null });
              return;
            }
            const total = Math.ceil(text.length / maxChunk);
            for (let index = 0; index < total; index++) {
              parent.postMessage(
                {
                  pluginMessage: {
                    type: "semantic-json-fetch-result-chunk",
                    id: mid,
                    index,
                    total,
                    chunk: text.slice(index * maxChunk, (index + 1) * maxChunk),
                  },
                },
                "*",
              );
            }
            reply({ ok: true, data: null, chunked: true, error: null });
          };
          const reportFetchStatus = (message) => {
            parent.postMessage(
              { pluginMessage: { type: "semantic-json-fetch-status", id: mid, message } },
              "*",
            );
          };
          (async () => {
            let endpoint = "";
            try {
              const b64ToU8 = (b64) => {
                const bin = atob(String(b64 || ""));
                const out = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i) & 0xff;
                return out;
              };
              const bannerBytes = b64ToU8(msg.bannerB64);
              const gridBytes = b64ToU8(msg.gridB64);
              const fd = new FormData();
              fd.append("banner", new Blob([bannerBytes], { type: "image/png" }), "banner.png");
              fd.append(
                "raw_json",
                new Blob([String(msg.rawJsonText || "")], { type: "application/json;charset=utf-8" }),
                "raw.json",
              );
              fd.append("grid", new Blob([gridBytes], { type: "image/png" }), "elements.png");
              fd.append("max_new_tokens", String(msg.maxNewTokens || 2048));
              const base = String(msg.backendUrl || "")
                .trim()
                .replace(/\/+$/, "");
              endpoint = base + "/figma/convert-semantic-json";
              reportFetchStatus("Semantic JSON: POST " + endpoint);
              const res = await fetch(endpoint, {
                method: "POST",
                body: fd,
                mode: "cors",
                credentials: "omit",
                redirect: "follow",
              });
              const text = await res.text();
              reportFetchStatus(
                "Semantic JSON: HTTP " +
                  String(res.status) +
                  " " +
                  String(res.statusText || "") +
                  " from " +
                  String(res.url || endpoint) +
                  " (" +
                  String(text.length) +
                  " chars)",
              );
              let body = null;
              try {
                body = text ? JSON.parse(text) : null;
              } catch (_e) {
                body = null;
              }
              if (!res.ok) {
                const detail =
                  body && body.detail != null
                    ? typeof body.detail === "string"
                      ? body.detail
                      : JSON.stringify(body.detail)
                    : text || "HTTP " + String(res.status);
                reply({ ok: false, data: null, error: detail });
                return;
              }
              if (!body || typeof body !== "object" || !("semantic_json" in body)) {
                reply({ ok: false, data: null, error: "Backend response missing semantic_json." });
                return;
              }
              replyData({
                semantic_json: body.semantic_json,
                warnings: Array.isArray(body.warnings) ? body.warnings : [],
              });
            } catch (e) {
              let detail = e && e.message ? e.message : String(e);
              if (detail === "Failed to fetch") {
                detail +=
                  " Figma only allows origins in manifest.json networkAccess (devAllowedDomains / allowedDomains). Match Backend URL exactly and reload the plugin.";
              }
              if (endpoint) detail += " URL: " + endpoint;
              reportFetchStatus("Semantic JSON fetch failed: " + detail);
              reply({ ok: false, data: null, error: detail });
            }
          })();
          return;
        }

        if (msg.type === "pipeline-busy") {
          setPipelineLoading(!!msg.busy, msg.overlayMessage);
        } else if (msg.type === "status") {
          setStatus(msg.message);
        } else if (msg.type === "error") {
          setPipelineLoading(false);
          setStatus("Error: " + msg.message);
        } else if (msg.type === "done") {
          setPipelineLoading(false);
          setStatus("Done.");
        } else if (msg.type === "selection-info") {
          setSelectedFrameInfo(msg.selection);
        } else if (msg.type === "html-css-export-result") {
          const isBatch = !!msg.batch;
          const append = !!msg.batchAppend;
          if (!msg.ok) {
            const errLine = msg.error || "Export failed. See status above.";
            if (isBatch && append) {
              setHtmlExportResult(
                (htmlExportResultEl.value || "").trimEnd() +
                  `\n\n<!-- ERROR ${(msg.batchIndex || 0) + 1}/${msg.batchTotal} ${msg.frameName || ""} -->\n${errLine}\n`,
              );
            } else if (isBatch) {
              setHtmlExportResult(
                `<!-- ERROR 1/${msg.batchTotal} ${msg.frameName || ""} -->\n${errLine}\n`,
              );
            } else {
              setHtmlExportResult("Export failed. See status above.");
            }
            return;
          }
          const html = msg.html || "";
          const header =
            isBatch && append
              ? `\n\n<!-- === ${(msg.batchIndex || 0) + 1}/${msg.batchTotal} ${msg.fileName || "export"} === -->\n\n`
              : isBatch
                ? `<!-- === 1/${msg.batchTotal} ${msg.fileName || "export"} === -->\n\n`
                : "";
          const prev = append ? (htmlExportResultEl.value || "").trimEnd() : "";
          setHtmlExportResult(prev + header + html);
          const delay = typeof msg.batchIndex === "number" ? msg.batchIndex * 320 : 0;
          setTimeout(() => {
            downloadTextFile(`${safeFileName(msg.fileName)}.html`, html, "text/html;charset=utf-8");
          }, delay);
          setStatus(`HTML/CSS exported: ${safeFileName(msg.fileName)}.html`);
        } else if (msg.type === "semantic-json-result") {
          const isBatch = !!msg.batch;
          const append = !!msg.batchAppend;
          if (!msg.ok) {
            const errLine = msg.error || "Request failed. See status above.";
            if (isBatch && append) {
              semanticJsonResultEl.value =
                (semanticJsonResultEl.value || "").trimEnd() +
                `\n\n/* === ERROR ${(msg.batchIndex || 0) + 1}/${msg.batchTotal} ${msg.frameName || ""} === */\n${errLine}\n`;
            } else if (isBatch) {
              semanticJsonResultEl.value = `/* === ERROR 1/${msg.batchTotal} ${msg.frameName || ""} === */\n${errLine}\n`;
            } else {
              semanticJsonResultEl.value = errLine;
            }
            return;
          }
          if (!msg.jsonText) {
            semanticJsonResultEl.value = "Empty JSON in response.";
            return;
          }
          const header =
            isBatch && append
              ? `\n\n/* === ${(msg.batchIndex || 0) + 1}/${msg.batchTotal} ${msg.fileName || "semantic"} === */\n\n`
              : isBatch
                ? `/* === 1/${msg.batchTotal} ${msg.fileName || "semantic"} === */\n\n`
                : "";
          const prev = append ? (semanticJsonResultEl.value || "").trimEnd() : "";
          semanticJsonResultEl.value = prev + header + msg.jsonText;
          lastSemanticFileBase = isBatch ? "semantic-batch" : safeFileName(msg.fileName || "semantic_figma");
          setStatus(
            `Semantic JSON ready (${(msg.jsonText.length / 1024).toFixed(1)} KB)${isBatch ? " — appended to batch" : ""}. Use Copy or Download.`,
          );
        }
      };
    </script>
  </body>
</html>
