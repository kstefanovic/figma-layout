<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Qwen Layout Converter</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: #111;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input, select, button, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
      }

      textarea {
        resize: none;
        min-height: 78px;
        font-family: Inter, system-ui, sans-serif;
      }

      button {
        background: #18a0fb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #0d8ae6;
      }

      #status {
        font-size: 12px;
        color: #555;
        min-height: 24px;
        white-space: pre-wrap;
      }

      .readonly {
        background: #f7f7f7;
        color: #333;
      }

      .zone-result {
        min-height: 160px;
        max-height: 280px;
        overflow: auto;
        white-space: pre;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }

      #classify-zone-btn:hover {
        background: #6d28d9;
      }

      #html-export-btn {
        background: #059669;
      }

      #copy-html-btn {
        background: #475569;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="selected-frame">Selected Figma Design</label>
      <textarea id="selected-frame" class="readonly" readonly>No frame selected.</textarea>
    </div>

    <div class="row">
      <label for="backend-url">Backend URL</label>
      <input id="backend-url" value="http://localhost:9298" />
    </div>

    <div class="row">
      <label for="gnn-url">Local GNN Predict URL</label>
      <input id="gnn-url" value="http://localhost:8000" />
    </div>

    <div class="row">
      <label for="target-size">Target Size (widthxheight)</label>
      <input id="target-size" value="1024x1280" placeholder="1024x1280" />
    </div>

    <div class="row">
      <button id="pipeline-btn">Generate Target JSON + Draw Clone</button>
    </div>

    <div class="row">
      <button id="convert-btn" type="button" style="background:#64748b">
        Legacy Convert Selected Frame
      </button>
    </div>

    <div class="row">
      <button id="classify-zone-btn" type="button" style="background: #7c3aed">
        Zone + text zones (v2 JSON)
      </button>
    </div>

    <div class="row">
      <button id="html-export-btn" type="button">
        JSON to HTML/CSS Exporter
      </button>
    </div>

    <div class="row">
      <label>HTML/CSS export</label>
      <textarea id="html-export-result" class="zone-result readonly" readonly>
Select one frame, then click “JSON to HTML/CSS Exporter”.
      </textarea>
      <button id="copy-html-btn" type="button" style="margin-top: 8px">
        Copy HTML/CSS
      </button>
    </div>

    <div class="row">
      <label>Zone classification (Qwen v2)</label>
      <div id="zone-result" class="zone-result readonly">
        Run the purple button on one selected frame. Pretty-printed JSON from
        POST /api/v2/analyze-text-zone-visual-json (orientation, zone_type,
        text_zone.groups: brand_group, headline_group, optional age_badge, legal_text).
      </div>
    </div>

    <div id="status"></div>

    <script>
      const statusEl = document.getElementById("status");
      const pipelineBtn = document.getElementById("pipeline-btn");
      const convertBtn = document.getElementById("convert-btn");
      const classifyZoneBtn = document.getElementById("classify-zone-btn");
      const htmlExportBtn = document.getElementById("html-export-btn");
      const htmlExportResultEl = document.getElementById("html-export-result");
      const copyHtmlBtn = document.getElementById("copy-html-btn");
      const zoneResultEl = document.getElementById("zone-result");
      const selectedFrameEl = document.getElementById("selected-frame");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function setSelectedFrameInfo(info) {
        if (!info || !info.hasSelection) {
          selectedFrameEl.value = "No frame selected.";
          return;
        }

        if (!info.isFrame) {
          selectedFrameEl.value =
            `Selected node is not a frame.\nName: ${info.name}\nType: ${info.type}`;
          return;
        }

        selectedFrameEl.value =
          `Name: ${info.name}\n` +
          `Type: ${info.type}\n` +
          `ID: ${info.id}\n` +
          `Size: ${info.width} × ${info.height}`;
      }

      function setZoneResult(text) {
        zoneResultEl.textContent = text;
      }

      function setHtmlExportResult(text) {
        htmlExportResultEl.value = text;
      }

      function safeFileName(value) {
        return String(value || "figma-export")
          .trim()
          .replace(/[^a-zA-Z0-9._-]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 80) || "figma-export";
      }

      function downloadTextFile(filename, text, mimeType) {
        const blob = new Blob([text], { type: mimeType || "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function normalizeTargetSizeText(value) {
        const raw = String(value || "").trim();
        const parts = raw
          .split(/[,\sx×]+/i)
          .map((part) => part.trim())
          .filter(Boolean);
        if (parts.length >= 2 && /^\d+(\.\d+)?$/.test(parts[0]) && /^\d+(\.\d+)?$/.test(parts[1])) {
          return `${Math.round(Number(parts[0]))}x${Math.round(Number(parts[1]))}`;
        }
        return raw;
      }

      const targetSizeEl = document.getElementById("target-size");
      targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value || "1024x1280");
      targetSizeEl.addEventListener("input", () => {
        if (targetSizeEl.value.includes(",")) {
          targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value);
        }
      });
      targetSizeEl.addEventListener("blur", () => {
        targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value);
      });

      pipelineBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetSize = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetSize;

        setStatus("Preparing pipeline request...");

        parent.postMessage(
          {
            pluginMessage: {
              type: "pipeline-target-json-selected-frame",
              backendUrl,
              targetSize
            }
          },
          "*"
        );
      };

      convertBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetPreset = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetPreset;
        const convertMode = "apply_to_clone_fast";
        setStatus("Preparing request...");

        parent.postMessage(
          {
            pluginMessage: {
              type: "convert-selected-frame",
              backendUrl,
              targetPreset,
              convertMode
            }
          },
          "*"
        );
      };

      classifyZoneBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const gnnUrl = document.getElementById("gnn-url").value.trim();
        const targetSize = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetSize;
        setStatus("Zone + text zones (v2): exporting frame…");
        setZoneResult("…");
        parent.postMessage(
          {
            pluginMessage: {
              type: "classify-zone-selected-frame",
              backendUrl,
              gnnUrl,
              targetSize
            }
          },
          "*"
        );
      };

      htmlExportBtn.onclick = () => {
        setStatus("Exporting selected frame JSON to HTML/CSS...");
        setHtmlExportResult("...");
        parent.postMessage(
          {
            pluginMessage: {
              type: "export-selected-frame-html-css"
            }
          },
          "*"
        );
      };

      copyHtmlBtn.onclick = async () => {
        const text = htmlExportResultEl.value || "";
        if (!text.trim()) {
          setStatus("Nothing to copy.");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("HTML/CSS copied to clipboard.");
        } catch (_e) {
          htmlExportResultEl.select();
          document.execCommand("copy");
          setStatus("HTML/CSS selected/copied.");
        }
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "status") {
          setStatus(msg.message);
        } else if (msg.type === "error") {
          setStatus("Error: " + msg.message);
        } else if (msg.type === "done") {
          setStatus("Done.");
        } else if (msg.type === "selection-info") {
          setSelectedFrameInfo(msg.selection);
        } else if (msg.type === "html-css-export-result") {
          if (!msg.ok) {
            setHtmlExportResult("Export failed. See status above.");
            return;
          }
          const html = msg.html || "";
          setHtmlExportResult(html);
          downloadTextFile(`${safeFileName(msg.fileName)}.html`, html, "text/html;charset=utf-8");
          setStatus(`HTML/CSS file exported: ${safeFileName(msg.fileName)}.html`);
        } else if (msg.type === "zone-classify-result") {
          if (!msg.ok || !msg.result) {
            setZoneResult("Request failed. See status above.");
            return;
          }
          try {
            setZoneResult(JSON.stringify(msg.result, null, 2));
          } catch (e) {
            setZoneResult(String(msg.result));
          }
        }
      };
    </script>
  </body>
</html>
