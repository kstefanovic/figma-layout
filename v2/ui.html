<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Qwen Layout Converter</title>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        color: #111;
      }

      .row {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input, select, button, textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
      }

      textarea {
        resize: none;
        min-height: 78px;
        font-family: Inter, system-ui, sans-serif;
      }

      button {
        background: #18a0fb;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #0d8ae6;
      }

      #status {
        font-size: 12px;
        color: #555;
        min-height: 24px;
        white-space: pre-wrap;
      }

      .readonly {
        background: #f7f7f7;
        color: #333;
      }

      .zone-result {
        min-height: 160px;
        max-height: 280px;
        overflow: auto;
        white-space: pre;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }

      #semantic-json-btn {
        background: #0d9488;
      }

      #semantic-json-btn:hover {
        background: #0f766e;
      }

      #html-export-btn {
        background: #059669;
      }

      #copy-html-btn,
      #copy-semantic-btn {
        background: #475569;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .pipeline-overlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.78);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
      }

      .pipeline-overlay[hidden] {
        display: none !important;
      }

      .pipeline-overlay-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 20px 28px;
        background: #fff;
        border-radius: 12px;
        border: 1px solid #e5e5e5;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      }

      .pipeline-overlay-text {
        font-size: 13px;
        font-weight: 600;
        color: #333;
      }

      .pipeline-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #e5e5e5;
        border-top-color: #18a0fb;
        border-radius: 50%;
        animation: pipeline-spin 0.85s linear infinite;
      }

      @keyframes pipeline-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="selected-frame">Selected Figma Design</label>
      <textarea id="selected-frame" class="readonly" readonly>No frame selected.</textarea>
    </div>

    <div class="row">
      <label for="backend-url">Backend URL</label>
      <input id="backend-url" value="http://localhost:9298" />
    </div>

    <div class="row">
      <label for="target-size">Target Size (widthxheight)</label>
      <input id="target-size" value="1024x1280" placeholder="1024x1280" />
    </div>

    <div class="row">
      <button id="pipeline-btn">Generate Target JSON + Draw Clone</button>
    </div>

    <div id="semantic-json-section">
      <div class="row">
        <label for="semantic-max-tokens">Semantic JSON — max new tokens (256–4096; too low truncates JSON)</label>
        <input id="semantic-max-tokens" type="number" min="256" max="4096" value="4096" />
      </div>

      <div class="row">
        <button id="semantic-json-btn" type="button">
          Banner + grid PNG + raw JSON → semantic JSON (Qwen)
        </button>
      </div>

      <div class="row">
        <label>Semantic JSON result</label>
        <textarea id="semantic-json-result" class="zone-result readonly" readonly>
Select one frame, then run “Banner + grid PNG + raw JSON → semantic JSON”.
        </textarea>
        <div style="display: flex; gap: 8px; margin-top: 8px">
          <button id="copy-semantic-btn" type="button" style="flex: 1">Copy JSON</button>
          <button id="download-semantic-btn" type="button" style="flex: 1; background: #334155">Download .json</button>
        </div>
      </div>
    </div>

    <div class="row">
      <button id="html-export-btn" type="button">
        JSON to HTML/CSS Exporter
      </button>
    </div>

    <div class="row">
      <label>HTML/CSS export</label>
      <textarea id="html-export-result" class="zone-result readonly" readonly>
Select one frame, then click “JSON to HTML/CSS Exporter”.
      </textarea>
      <button id="copy-html-btn" type="button" style="margin-top: 8px">
        Copy HTML/CSS
      </button>
    </div>

    <div id="status"></div>

    <div id="pipeline-overlay" class="pipeline-overlay" hidden aria-live="polite">
      <div class="pipeline-overlay-card">
        <div class="pipeline-spinner" role="status" aria-label="Loading"></div>
        <div class="pipeline-overlay-text">Calling backend…</div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const pipelineBtn = document.getElementById("pipeline-btn");
      const semanticJsonBtn = document.getElementById("semantic-json-btn");
      const semanticMaxTokensEl = document.getElementById("semantic-max-tokens");
      const semanticJsonResultEl = document.getElementById("semantic-json-result");
      const copySemanticBtn = document.getElementById("copy-semantic-btn");
      const downloadSemanticBtn = document.getElementById("download-semantic-btn");
      const htmlExportBtn = document.getElementById("html-export-btn");
      const htmlExportResultEl = document.getElementById("html-export-result");
      const copyHtmlBtn = document.getElementById("copy-html-btn");
      const selectedFrameEl = document.getElementById("selected-frame");
      let lastSemanticFileBase = "semantic_figma";

      function setStatus(message) {
        statusEl.textContent = message;
      }

      const pipelineOverlayEl = document.getElementById("pipeline-overlay");

      function setPipelineLoading(on) {
        const busy = !!on;
        if (pipelineOverlayEl) pipelineOverlayEl.hidden = !busy;
        if (pipelineBtn) pipelineBtn.disabled = busy;
      }

      function setSelectedFrameInfo(info) {
        if (!info || !info.hasSelection) {
          selectedFrameEl.value = "No frame selected.";
          return;
        }

        if (!info.isFrame) {
          selectedFrameEl.value =
            `Selected node is not a frame.\nName: ${info.name}\nType: ${info.type}`;
          return;
        }

        selectedFrameEl.value =
          `Name: ${info.name}\n` +
          `Type: ${info.type}\n` +
          `ID: ${info.id}\n` +
          `Size: ${info.width} × ${info.height}`;
      }

      function setHtmlExportResult(text) {
        htmlExportResultEl.value = text;
      }

      function safeFileName(value) {
        return String(value || "figma-export")
          .trim()
          .replace(/[^a-zA-Z0-9._-]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 80) || "figma-export";
      }

      function downloadTextFile(filename, text, mimeType) {
        const blob = new Blob([text], { type: mimeType || "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function normalizeTargetSizeText(value) {
        const raw = String(value || "").trim();
        const parts = raw
          .split(/[,\sx×]+/i)
          .map((part) => part.trim())
          .filter(Boolean);
        if (parts.length >= 2 && /^\d+(\.\d+)?$/.test(parts[0]) && /^\d+(\.\d+)?$/.test(parts[1])) {
          return `${Math.round(Number(parts[0]))}x${Math.round(Number(parts[1]))}`;
        }
        return raw;
      }

      const targetSizeEl = document.getElementById("target-size");
      targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value || "1024x1280");
      targetSizeEl.addEventListener("input", () => {
        if (targetSizeEl.value.includes(",")) {
          targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value);
        }
      });
      targetSizeEl.addEventListener("blur", () => {
        targetSizeEl.value = normalizeTargetSizeText(targetSizeEl.value);
      });

      semanticJsonBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const mt = Math.min(
          4096,
          Math.max(256, parseInt(String(semanticMaxTokensEl.value), 10) || 4096),
        );
        semanticMaxTokensEl.value = String(mt);
        setStatus("Building banner + grid + raw JSON and calling backend…");
        semanticJsonResultEl.value = "…";
        parent.postMessage(
          {
            pluginMessage: {
              type: "semantic-json-grid-selected-frame",
              backendUrl,
              maxNewTokens: mt,
            },
          },
          "*",
        );
      };

      copySemanticBtn.onclick = async () => {
        const text = semanticJsonResultEl.value || "";
        if (!text.trim() || text.trim() === "…") {
          setStatus("Nothing to copy.");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("Semantic JSON copied.");
        } catch (_e) {
          semanticJsonResultEl.select();
          document.execCommand("copy");
          setStatus("Semantic JSON selected / copied.");
        }
      };

      downloadSemanticBtn.onclick = () => {
        const text = semanticJsonResultEl.value || "";
        if (!text.trim() || text.trim() === "…") {
          setStatus("No JSON to download.");
          return;
        }
        downloadTextFile(
          `${safeFileName(lastSemanticFileBase)}.json`,
          text,
          "application/json;charset=utf-8",
        );
        setStatus("Downloaded " + safeFileName(lastSemanticFileBase) + ".json");
      };

      pipelineBtn.onclick = () => {
        const backendUrl = document.getElementById("backend-url").value.trim();
        const targetSize = normalizeTargetSizeText(document.getElementById("target-size").value);
        document.getElementById("target-size").value = targetSize;

        setStatus("Preparing pipeline request...");
        setPipelineLoading(true);

        parent.postMessage(
          {
            pluginMessage: {
              type: "pipeline-target-json-selected-frame",
              backendUrl,
              targetSize
            }
          },
          "*"
        );
      };

      htmlExportBtn.onclick = () => {
        setStatus("Exporting selected frame JSON to HTML/CSS...");
        setHtmlExportResult("...");
        parent.postMessage(
          {
            pluginMessage: {
              type: "export-selected-frame-html-css"
            }
          },
          "*"
        );
      };

      copyHtmlBtn.onclick = async () => {
        const text = htmlExportResultEl.value || "";
        if (!text.trim()) {
          setStatus("Nothing to copy.");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("HTML/CSS copied to clipboard.");
        } catch (_e) {
          htmlExportResultEl.select();
          document.execCommand("copy");
          setStatus("HTML/CSS selected/copied.");
        }
      };

      window.onmessage = (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;

        if (msg.type === "pipeline-busy") {
          setPipelineLoading(!!msg.busy);
        } else if (msg.type === "status") {
          setStatus(msg.message);
        } else if (msg.type === "error") {
          setStatus("Error: " + msg.message);
        } else if (msg.type === "done") {
          setStatus("Done.");
        } else if (msg.type === "selection-info") {
          setSelectedFrameInfo(msg.selection);
        } else if (msg.type === "html-css-export-result") {
          if (!msg.ok) {
            setHtmlExportResult("Export failed. See status above.");
            return;
          }
          const html = msg.html || "";
          setHtmlExportResult(html);
          downloadTextFile(`${safeFileName(msg.fileName)}.html`, html, "text/html;charset=utf-8");
          setStatus(`HTML/CSS file exported: ${safeFileName(msg.fileName)}.html`);
        } else if (msg.type === "semantic-json-result") {
          if (!msg.ok || !msg.jsonText) {
            semanticJsonResultEl.value = msg.error || "Request failed. See status above.";
            return;
          }
          lastSemanticFileBase = safeFileName(msg.fileName || "semantic_figma");
          semanticJsonResultEl.value = msg.jsonText;
          setStatus(`Semantic JSON ready (${(msg.jsonText.length / 1024).toFixed(1)} KB). Use Copy or Download.`);
        }
      };
    </script>
  </body>
</html>
